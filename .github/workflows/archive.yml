name: Archive Frankfurt History

on:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: archive
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run archival
        run: uv run archive.py

      - name: Start DeepLX translation server
        run: |
          curl -sL "https://github.com/OwO-Network/DeepLX/releases/latest/download/deeplx_linux_amd64" -o /tmp/deeplx
          chmod +x /tmp/deeplx
          /tmp/deeplx -p 1188 &
          sleep 2

      - name: Fetch Stolpersteine from frankfurt.de
        continue-on-error: true
        timeout-minutes: 10
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DEEPLX_URL: http://127.0.0.1:1188
        run: uv run scripts/fetch_stolpersteine.py --scrape --translate

      - name: Build Stolpersteine articles
        run: uv run scripts/build_stolpersteine.py

      - name: Reverse geocode addresses
        env:
          GEOCODE_PROXY_URL: ${{ secrets.GEOCODE_PROXY_URL }}
          GEOCODE_PROXY_TOKEN: ${{ secrets.GEOCODE_PROXY_TOKEN }}
        run: uv run scripts/geocode_addresses.py

      - name: Commit and push data changes
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No new changes to commit"
          else
            git commit -m "archive: update $(date -u +%Y-%m-%d)"
          fi
          git pull --rebase
          git push

      - name: Push progress on failure
        if: cancelled() || failure()
        run: |
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "archive: partial progress $(date -u +%Y-%m-%d)"
          fi
          git pull --rebase
          git push

      - name: Sync images to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          uv run scripts/sync_images.py
