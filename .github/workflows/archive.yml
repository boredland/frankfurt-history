name: Archive Frankfurt History

on:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: archive
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Run archival
        run: uv run archive.py

      - name: Fetch Stolpersteine from frankfurt.de
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          SCRAPFLY_API_KEY: ${{ secrets.SCRAPFLY_API_KEY }}
        run: uv run scripts/fetch_stolpersteine.py --scrape --translate

      - name: Reverse geocode addresses
        env:
          GEOCODE_PROXY_URL: ${{ secrets.GEOCODE_PROXY_URL }}
          GEOCODE_PROXY_TOKEN: ${{ secrets.GEOCODE_PROXY_TOKEN }}
        run: uv run scripts/geocode_addresses.py

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "archive: update $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi

      - name: Sync images to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          uv run scripts/sync_images.py
