name: Archive Frankfurt History

on:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths: [app/**, scripts/**, overrides/**]

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run archival
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: uv run archive.py

      - name: Commit and push data changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "archive: update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Sync images to R2
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uv run scripts/sync_images.py

      - name: Upload PMTiles basemap to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Check if PMTiles already exists on R2 by trying to fetch first 16 bytes
          if curl -sf --range 0-15 "https://pub-d6ff75a2458a49e5b81457a2e7841032.r2.dev/frankfurt.pmtiles" | head -c 7 | grep -q PMTiles; then
            echo "PMTiles already on R2, skipping"
          else
            # Install go-pmtiles
            VERSION=$(curl -s https://api.github.com/repos/protomaps/go-pmtiles/releases/latest | grep tag_name | cut -d'"' -f4)
            curl -sL "https://github.com/protomaps/go-pmtiles/releases/download/${VERSION}/go-pmtiles_${VERSION#v}_Linux_x86_64.tar.gz" | tar xz pmtiles
            DATE=$(date -u +%Y%m%d)
            ./pmtiles extract "https://build.protomaps.com/${DATE}.pmtiles" frankfurt.pmtiles --bbox=8.3,49.9,9.0,50.3 --maxzoom=15
            wrangler r2 object put frankfurt-history-assets/frankfurt.pmtiles --file=frankfurt.pmtiles --content-type=application/octet-stream
          fi

      - name: Build app
        working-directory: app
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy to Cloudflare Pages
        working-directory: app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy
